<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EduGenie</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/style.css">
</head>
<body>

<!-- ============== AUTH SCREEN ============== -->
<div class="auth" id="authScreen" hidden>
  <div class="auth__card">
    <div class="auth__brand">
      <div class="masthead__mark">Eg</div>
      <h1>EduGenie</h1>
    </div>

    <div class="auth__tabs" role="tablist">
      <button class="auth__tab is-active" data-authpanel="login" type="button">Log in</button>
      <button class="auth__tab" data-authpanel="signup" type="button">Sign up</button>
    </div>

    <form id="form-login" class="form auth__panel is-active" data-authpanel="login">
      <label for="login-email">Email</label>
      <input id="login-email" type="email" required autocomplete="email" placeholder="you@example.com">
      <label for="login-password">Password</label>
      <input id="login-password" type="password" required autocomplete="current-password" placeholder="••••••••">
      <button type="submit" class="btn btn--block">Log in</button>
      <p class="auth__error" id="login-error" hidden></p>
    </form>

    <form id="form-signup" class="form auth__panel" data-authpanel="signup" hidden>
      <label for="signup-name">Name</label>
      <input id="signup-name" type="text" required autocomplete="name" placeholder="Your name">
      <label for="signup-email">Email</label>
      <input id="signup-email" type="email" required autocomplete="email" placeholder="you@example.com">
      <label for="signup-password">Password</label>
      <input id="signup-password" type="password" required minlength="6" autocomplete="new-password" placeholder="At least 6 characters">
      <button type="submit" class="btn btn--block">Create account</button>
      <p class="auth__error" id="signup-error" hidden></p>
    </form>
  </div>
</div>

<!-- ============== APP SHELL ============== -->
<div class="page" id="appShell" hidden>

  <header class="masthead">
    <div class="masthead__mark">Eg</div>
    <div class="masthead__text">
      <h1>EduGenie</h1>
    </div>
    <div class="masthead__user">
      <span class="status-dot" id="statusDot"></span>
      <span class="masthead__username" id="userName"></span>
      <button class="btn btn--ghost" id="logoutBtn" type="button">Log out</button>
    </div>
  </header>

  <nav class="tabs" role="tablist" aria-label="EduGenie tools">
    <button class="tab" data-panel="ask" role="tab" aria-selected="true">
      <span class="tab__index">01</span>Ask
    </button>
    <button class="tab" data-panel="explain" role="tab" aria-selected="false">
      <span class="tab__index">02</span>Explain
    </button>
    <button class="tab" data-panel="quiz" role="tab" aria-selected="false">
      <span class="tab__index">03</span>Quiz me
    </button>
    <button class="tab" data-panel="summarize" role="tab" aria-selected="false">
      <span class="tab__index">04</span>Summarize
    </button>
    <button class="tab" data-panel="path" role="tab" aria-selected="false">
      <span class="tab__index">05</span>Learning path
    </button>
    <button class="tab" data-panel="history" role="tab" aria-selected="false">
      <span class="tab__index">06</span>History
    </button>
  </nav>

  <main class="sheet">

    <!-- ASK -->
    <section class="panel is-active" id="panel-ask">
      <h2>Ask a question</h2>
      <form id="form-ask" class="form">
        <label for="ask-question">Your question</label>
        <textarea id="ask-question" required placeholder="e.g. Which is the largest ocean?"></textarea>
        <button type="submit" class="btn">Ask EduGenie</button>
      </form>
      <div class="result" id="result-ask" hidden></div>
    </section>

    <!-- EXPLAIN -->
    <section class="panel" id="panel-explain">
      <h2>Explain a concept</h2>
      <form id="form-explain" class="form">
        <label for="explain-concept">Concept</label>
        <input id="explain-concept" type="text" required placeholder="e.g. Pythagoras Theorem">
        <label for="explain-level">Explain it like I'm...</label>
        <select id="explain-level">
          <option value="beginner">Just starting out</option>
          <option value="intermediate">Comfortable with basics</option>
          <option value="advanced">Ready for depth</option>
        </select>
        <button type="submit" class="btn">Explain it</button>
      </form>
      <div class="result" id="result-explain" hidden></div>
    </section>

    <!-- QUIZ -->
    <section class="panel" id="panel-quiz">
      <h2>Generate a quiz</h2>
      <form id="form-quiz" class="form">
        <label for="quiz-topic">Topic</label>
        <input id="quiz-topic" type="text" required placeholder="e.g. Pythagoras Theorem">
        <div class="form-row">
          <div>
            <label for="quiz-count">Questions</label>
            <input id="quiz-count" type="number" min="1" max="15" value="5">
          </div>
          <div>
            <label for="quiz-difficulty">Difficulty</label>
            <select id="quiz-difficulty">
              <option value="easy">Easy</option>
              <option value="medium" selected>Medium</option>
              <option value="hard">Hard</option>
            </select>
          </div>
        </div>
        <button type="submit" class="btn">Generate quiz</button>
      </form>
      <div class="result" id="result-quiz" hidden></div>
    </section>

    <!-- SUMMARIZE -->
    <section class="panel" id="panel-summarize">
      <h2>Summarize study material</h2>
      <form id="form-summarize" class="form">
        <label for="summarize-text">Text to summarize</label>
        <textarea id="summarize-text" required rows="8" placeholder="Paste your text here..."></textarea>
        <label for="summarize-length">Summary length</label>
        <select id="summarize-length">
          <option value="short">Short (2-3 sentences)</option>
          <option value="medium" selected>Medium (one paragraph)</option>
          <option value="detailed">Detailed (with key points)</option>
        </select>
        <button type="submit" class="btn">Summarize</button>
      </form>
      <div class="result" id="result-summarize" hidden></div>
    </section>

    <!-- LEARNING PATH -->
    <section class="panel" id="panel-path">
      <h2>Build a learning path</h2>
      <form id="form-path" class="form">
        <label for="path-topic">Topic</label>
        <input id="path-topic" type="text" required placeholder="e.g. SQL">
        <label for="path-level">Current level</label>
        <select id="path-level">
          <option value="beginner">Beginner</option>
          <option value="intermediate">Intermediate</option>
          <option value="advanced">Advanced</option>
        </select>
        <label for="path-goal">Goal (optional)</label>
        <input id="path-goal" type="text" placeholder="e.g. be job-ready for a data analyst role">
        <button type="submit" class="btn">Build my path</button>
      </form>
      <div class="result" id="result-path" hidden></div>
    </section>

    <!-- HISTORY -->
    <section class="panel" id="panel-history">
      <h2>Your history</h2>
      <div class="history-list" id="historyList"></div>
    </section>

  </main>

</div>

<template id="tpl-quiz-card">
  <article class="quiz-card">
    <div class="quiz-card__front">
      <span class="quiz-card__num"></span>
      <p class="quiz-card__question"></p>
      <ul class="quiz-card__options"></ul>
      <button type="button" class="btn btn--ghost quiz-card__reveal">Reveal answer</button>
    </div>
    <div class="quiz-card__back" hidden>
      <p class="quiz-card__correct"></p>
      <p class="quiz-card__explanation"></p>
    </div>
  </article>
</template>

<template id="tpl-history-item">
  <article class="history-item">
    <div class="history-item__head">
      <span class="tag history-item__tool"></span>
      <span class="history-item__date"></span>
      <button type="button" class="history-item__delete" title="Delete">✕</button>
    </div>
    <p class="history-item__input"></p>
    <p class="history-item__result"></p>
  </article>
</template>

<script src="/static/script.js"></script>
</body>
</html>
